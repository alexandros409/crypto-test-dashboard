<!doctype html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Crypto Portfolio Tracker</title>

  <link rel="icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="42" fill="%230f172a"/><circle cx="96" cy="96" r="56" fill="%23f59e0b"/><text x="50%" y="56%" dominant-baseline="middle" text-anchor="middle" font-size="96" fill="%23ffffff">₿</text></svg>'>
  
  <!-- Σύνδεση με το εξωτερικό Manifest αρχείο -->
  <link rel="manifest" href="/manifest.json" />

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    html, body { height: 100%; overflow-x: hidden; }
    body {
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.16), transparent 28%),
        radial-gradient(circle at top right, rgba(168,85,247,.12), transparent 25%),
        linear-gradient(180deg, #020617 0%, #0b1120 100%);
    }
    .glass {
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(148, 163, 184, 0.14);
      backdrop-filter: blur(18px);
    }
    .soft-shadow { box-shadow: 0 16px 50px rgba(0,0,0,.35); }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; font-size: 16px !important; }
  </style>
</head>
<body class="h-full text-slate-100 antialiased">
  <div class="min-h-full">
    <div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
      <header class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <div class="inline-flex items-center gap-2 rounded-full border border-slate-700/70 bg-slate-900/70 px-3 py-1 text-xs text-slate-300">
            <span class="h-2 w-2 rounded-full bg-emerald-400"></span>
            Live Portfolio Dashboard
          </div>
          <h1 class="mt-3 text-2xl font-semibold tracking-tight text-white sm:text-4xl">Crypto Portfolio Tracker</h1>
        </div>
        <div class="glass soft-shadow rounded-2xl px-4 py-3">
          <div class="text-xs uppercase tracking-[0.2em] text-slate-400">Total portfolio value</div>
          <div id="totalValue" class="mt-1 text-3xl font-semibold text-white">€0.00</div>
          <div id="deltaHint" class="mt-1 text-xs text-emerald-400">Fetching live prices...</div>
        </div>
      </header>

      <main class="grid gap-6 lg:grid-cols-5">
        <section class="glass soft-shadow rounded-3xl p-4 lg:col-span-3 overflow-hidden">
          <div class="mb-4 flex items-center justify-between gap-2">
            <div>
              <h2 class="text-lg font-semibold text-white">Assets</h2>
            </div>
            <div id="lastUpdatedBadge" class="rounded-xl border border-slate-700 bg-slate-900/60 px-2 py-1 text-[11px] text-slate-300 whitespace-nowrap">
              Loading...
            </div>
          </div>

          <div class="overflow-x-auto rounded-2xl border border-slate-800">
            <table class="min-w-full divide-y divide-slate-800 table-fixed">
              <thead class="bg-slate-900/70">
                <tr>
                  <th class="w-1/4 px-3 py-3 text-left text-xs font-medium uppercase tracking-wider text-slate-400">Asset</th>
                  <th class="w-1/3 px-3 py-3 text-left text-xs font-medium uppercase tracking-wider text-slate-400">Holding</th>
                  <th class="w-1/4 px-3 py-3 text-left text-xs font-medium uppercase tracking-wider text-slate-400">Price</th>
                  <th class="w-1/4 px-3 py-3 text-right text-xs font-medium uppercase tracking-wider text-slate-400">Value</th>
                </tr>
              </thead>
              <tbody id="assetRows" class="divide-y divide-slate-800 bg-slate-950/40"></tbody>
            </table>
          </div>

          <div class="mt-4 grid gap-3 grid-cols-3 text-center">
            <div class="rounded-2xl border border-slate-800 bg-slate-900/50 p-3">
              <div class="text-[10px] uppercase tracking-wider text-slate-400">Largest</div>
              <div id="largestAsset" class="mt-1 text-xs font-semibold text-white truncate">—</div>
            </div>
            <div class="rounded-2xl border border-slate-800 bg-slate-900/50 p-3">
              <div class="text-[10px] uppercase tracking-wider text-slate-400">Share</div>
              <div id="largestShare" class="mt-1 text-xs font-semibold text-white truncate">—</div>
            </div>
            <div class="rounded-2xl border border-slate-800 bg-slate-900/50 p-3">
              <div class="text-[10px] uppercase tracking-wider text-slate-400">Status</div>
              <div id="statusText" class="mt-1 text-xs font-semibold text-emerald-400 truncate">Healthy</div>
            </div>
          </div>
        </section>

        <section class="glass soft-shadow rounded-3xl p-4 lg:col-span-2">
          <div class="mb-4">
            <h2 class="text-lg font-semibold text-white">Allocation</h2>
          </div>

          <div class="rounded-2xl border border-slate-800 bg-slate-950/40 p-2">
            <div style="position: relative; height:220px; width:100%">
              <canvas id="portfolioChart"></canvas>
            </div>
          </div>

          <div class="mt-4 space-y-2">
            <div class="rounded-xl border border-slate-800 bg-slate-900/50 p-3">
              <div class="flex items-center justify-between text-xs">
                <span class="text-slate-400">BTC</span>
                <span id="shareBTC" class="font-medium text-white">0%</span>
              </div>
              <div class="mt-1 h-1.5 rounded-full bg-slate-800">
                <div id="barBTC" class="h-1.5 rounded-full bg-amber-400 transition-all duration-500" style="width:0%"></div>
              </div>
            </div>
            <div class="rounded-xl border border-slate-800 bg-slate-900/50 p-3">
              <div class="flex items-center justify-between text-xs">
                <span class="text-slate-400">ETH</span>
                <span id="shareETH" class="font-medium text-white">0%</span>
              </div>
              <div class="mt-1 h-1.5 rounded-full bg-slate-800">
                <div id="barETH" class="h-1.5 rounded-full bg-sky-400 transition-all duration-500" style="width:0%"></div>
              </div>
            </div>
            <div class="rounded-xl border border-slate-800 bg-slate-900/50 p-3">
              <div class="flex items-center justify-between text-xs">
                <span class="text-slate-400">SOL</span>
                <span id="shareSOL" class="font-medium text-white">0%</span>
              </div>
              <div class="mt-1 h-1.5 rounded-full bg-slate-800">
                <div id="barSOL" class="h-1.5 rounded-full bg-violet-400 transition-all duration-500" style="width:0%"></div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    // Σωστή εγγραφή του εξωτερικού Service Worker αρχείου
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => reg.update())
          .catch(() => {});
      });
    }

    const savedHoldings = JSON.parse(localStorage.getItem("crypto_holdings")) || {
      BTC: 0.040952,
      ETH: 1.291702,
      SOL: 28.967152
    };

    const assets = [
      { name: "Bitcoin", symbol: "BTC", holding: savedHoldings.BTC, price: 0 },
      { name: "Ethereum", symbol: "ETH", holding: savedHoldings.ETH, price: 0 },
      { name: "Solana", symbol: "SOL", holding: savedHoldings.SOL, price: 0 }
    ];

    const colors = ["#f59e0b", "#38bdf8", "#a855f7"];
    const rowsEl = document.getElementById("assetRows");
    const totalValueEl = document.getElementById("totalValue");
    const largestAssetEl = document.getElementById("largestAsset");
    const largestShareEl = document.getElementById("largestShare");
    const statusTextEl = document.getElementById("statusText");
    const deltaHintEl = document.getElementById("deltaHint");
    const lastUpdatedBadge = document.getElementById("lastUpdatedBadge");

    const chart = new Chart(document.getElementById("portfolioChart"), {
      type: "pie",
      data: {
        labels: assets.map(a => a.symbol),
        datasets: [{
          data: [0, 0, 0],
          backgroundColor: colors,
          borderColor: "#0f172a",
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: "#e2e8f0", boxWidth: 12 } }
        }
      }
    });

    function formatEUR(n) {
      return new Intl.NumberFormat("en-GB", { style: "currency", currency: "EUR" }).format(n);
    }

    function buildRows() {
      rowsEl.innerHTML = assets.map((asset, i) => `
        <tr>
          <td class="px-2 py-3">
            <div class="font-medium text-sm text-white">${asset.symbol}</div>
          </td>
          <td class="px-2 py-3">
            <input
              data-index="${i}"
              type="number"
              step="any"
              value="${asset.holding}"
              class="holding-input w-full rounded-lg border border-slate-700 bg-slate-900/80 py-1.5 px-2 text-white outline-none focus:border-sky-450"
              style="font-size: 16px !important; min-width: 80px;"
            />
          </td>
          <td class="px-2 py-3 text-xs text-slate-300">
            <span id="price-${i}">€0.00</span>
          </td>
          <td class="px-2 py-3 text-right text-sm font-semibold text-white">
            <span id="value-${i}">€0.00</span>
          </td>
        </tr>
      `).join("");

      document.querySelectorAll(".holding-input").forEach(input => {
        input.addEventListener("input", e => {
          const idx = Number(e.target.dataset.index);
          assets[idx].holding = Number(e.target.value || 0);
          
          const newHoldings = {
            BTC: assets[0].holding,
            ETH: assets[1].holding,
            SOL: assets[2].holding
          };
          localStorage.setItem("crypto_holdings", JSON.stringify(newHoldings));
          
          updateUI();
        });
      });
    }

    function updateUI() {
      const values = assets.map(a => a.holding * a.price);
      const total = values.reduce((s, v) => s + v, 0);

      assets.forEach((a, i) => {
        document.getElementById(`price-${i}`).textContent = formatEUR(a.price);
        document.getElementById(`value-${i}`).textContent = formatEUR(values[i]);
      });

      totalValueEl.textContent = formatEUR(total);

      const shares = total > 0 ? values.map(v => (v / total) * 100) : [0, 0, 0];
      chart.data.datasets[0].data = values;
      chart.update();

      ["BTC", "ETH", "SOL"].forEach((sym, i) => {
        const share = shares[i];
        document.getElementById(`share${sym}`).textContent = `${share.toFixed(1)}%`;
        document.getElementById(`bar${sym}`).style.width = `${Math.max(share, 2)}%`;
      });

      const maxIndex = values.indexOf(Math.max(...values));
      largestAssetEl.textContent = assets[maxIndex].symbol;
      largestShareEl.textContent = total > 0 ? `${shares[maxIndex].toFixed(0)}%` : "—";
      statusTextEl.textContent = "Live";
      lastUpdatedBadge.textContent = `Update: ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
    }

    async function fetchPrices() {
      try {
        const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=eur");
        if (!res.ok) throw new Error();
        const data = await res.json();
        assets[0].price = data.bitcoin.eur;
        assets[1].price = data.ethereum.eur;
        assets[2].price = data.solana.eur;
        updateUI();
        deltaHintEl.textContent = "Live prices active";
      } catch (err) {
        lastUpdatedBadge.textContent = "Sync Fail";
      }
    }

    buildRows();
    fetchPrices();
    setInterval(fetchPrices, 30000);
  </script>
</body>
</html>
